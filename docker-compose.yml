version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.3
    environment:
      POSTGRES_USER: cleanloop
      POSTGRES_PASSWORD: cleanloop_dev
      POSTGRES_DB: cleanloop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanloop"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cleanloop

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cleanloop

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - cleanloop

  app:
    build: .
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: postgresql://cleanloop:cleanloop_dev@postgres:5432/cleanloop_db
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: http://localstack:4566
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - cleanloop

volumes:
  postgres_data:
  localstack_data:

networks:
  cleanloop:
    driver: bridge
